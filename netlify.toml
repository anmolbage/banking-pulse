[build]
  publish = "public"
  functions = "netlify/functions"

[functions]
  node_bundler = "esbuild"

# Headers for API endpoint
[[headers]]
  for = "/api/*"
  [headers.values]
    Access-Control-Allow-Origin = "https://bankingpulse.app"
    Access-Control-Allow-Methods = "GET, OPTIONS"
    Access-Control-Allow-Headers = "Content-Type, Authorization"
    Cache-Control = "public, max-age=900"

# SPA fallback for app
[[redirects]]
  from = "/app/*"
  to = "/app/index.html"
  status = 200

# API proxy to function
[[redirects]]
  from = "/api/news"
  to = "/.netlify/functions/get-news"
  status = 200

[[redirects]]
  from = "/api/auth"
  to = "/.netlify/functions/auth"
  status = 200
